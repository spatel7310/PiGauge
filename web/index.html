<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>PiGauge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Pixel-art driving scene -->
  <canvas id="scene"></canvas>

  <!-- RPM: top-left -->
  <div id="rpm-display">
    <span id="rpm" class="rpm-val">----</span>
    <span class="rpm-unit">RPM</span>
  </div>

  <!-- Other gauges: top-right -->
  <div id="gauges">
    <div class="g">
      <span id="speed" class="g-val">---</span>
      <span class="g-unit">mph</span>
    </div>
    <div class="g">
      <span id="coolant" class="g-val">---</span>
      <span class="g-unit">&deg;F</span>
    </div>
    <div class="g">
      <span id="throttle" class="g-val">---</span>
      <span class="g-unit">%</span>
    </div>
    <div class="g">
      <span id="battery" class="g-val">--.-</span>
      <span class="g-unit">V</span>
    </div>
  </div>

  <!-- Connection status -->
  <div id="status">
    <span id="status-dot" class="dot disconnected"></span>
  </div>

  <div id="mock-badge" class="mock-badge hidden">MOCK</div>

  <script src="scene.js"></script>
  <script src="app.js"></script>
</body>
</html>
